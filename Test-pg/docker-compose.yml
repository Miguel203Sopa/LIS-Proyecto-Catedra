version: "3.9"

services:
  db:
    image: postgres:16
    container_name: mi_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: midb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: backend_app
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - db


  frontend:
    build: ./frontend
    container_name: frontend_app
    ports:
    - "8080:80"
    depends_on:
    - backend

volumes:
  postgres_data: